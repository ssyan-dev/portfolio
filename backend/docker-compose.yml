  postgres:
    image: postgres:18.1-bookworm
    container_name: portfolio-postgres
    ports:
      - '${POSTGRES_PORT}:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    networks:
      - portfolio-network

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: portfolio-postgres-migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    networks:
      - portfolio-network
    depends_on:
      - postgres

  redis:
    image: redis:8.6-alpine
    container_name: portfolio-redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - ${PROJECT_ROOT}/out/redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    restart: always
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
